<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="estilos_formulario.css">
    
    <script src="./js/formulario.js"></script>
    <script src="./js/procesar_form.js"></script>
</head>
<body>

    <div class="contenedor-entorno py-5">
        
        <div class="container container-formulario bg-white p-4 shadow-sm rounded">
            <form action="" method="post" id="formularioRegistro">
                
                <div class="row">
                    <div class="col">
                        <h2 class="fw-bold mb-3 border-bottom pb-2">Formulario Registro</h2>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="input_nombre" class="form-label fw-semibold">Nombre Completo *</label>
                        <input type="text" class="form-control" id="input_nombre" placeholder="Nombre completo">
                    </div>
                    <div class="col-md-6">
                        <label for="input_rut" class="form-label fw-semibold">RUT *</label>
                        <input type="text" class="form-control" id="input_rut" placeholder="12345678-k">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="input_fechaNacimiento" class="form-label fw-semibold">Fecha de Nacimiento</label>
                        <input type="date" class="form-control" id="input_fechaNacimiento">
                    </div>
                    <div class="col-md-6">
                        <label for="input_cv" class="form-label fw-semibold">Currículum Vitae</label>
                        <input type="file" class="form-control" id="input_cv" accept=".pdf,.docx">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="input_email" class="form-label fw-semibold">Email *</label>
                        <input type="email" class="form-control" id="input_email" placeholder="correo@servidor.com">
                    </div>
                    <div class="col-md-6">
                        <label for="select_genero" class="form-label fw-semibold">Género</label>
                        <select class="form-select" id="select_genero">
                            <option value="">Seleccione...</option>
                            <option value="Masculino">Masculino</option>
                            <option value="Femenino">Femenino</option>
                            <option value="Otro">Otro</option>
                        </select>
                    </div>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label for="input_contrasena" class="form-label fw-semibold">Contraseña *</label>
                        <input type="password" class="form-control" id="input_contrasena" placeholder="********">
                    </div>
                    <div class="col-md-6">
                        <label for="input_confirm_contrasena" class="form-label fw-semibold">Repetir Contraseña *</label>
                        <input type="password" class="form-control" id="input_confirm_contrasena" placeholder="********">
                    </div>
                </div>

                <div class="row">
                    <div class="col text-end">
                        <input type="button" class="btn btn-outline-secondary me-2 px-4" value="Cancelar" id="btn_cancelar">
                        <button type="button" onclick="validarFormulario()" class="btn btn-dark px-4">Guardar</button>
                    </div>
                </div>

            </form>
        </div>

    </div>

</body>
</html>
